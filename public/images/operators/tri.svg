<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="tri-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#660000"/>
      <stop offset="50%" stop-color="#CC0000"/>
      <stop offset="100%" stop-color="#440000"/>
    </linearGradient>
    <linearGradient id="tri-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFCCCC"/>
    </linearGradient>
    <filter id="tri-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="200" height="200" rx="20" fill="url(#tri-bg)"/>
  <rect x="3" y="3" width="194" height="194" rx="18" fill="none" stroke="#FFFFFF" stroke-opacity="0.2" stroke-width="1.5"/>
  <circle cx="100" cy="85" r="35" fill="none" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="2"/>
  <text x="100" y="125" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="60" fill="url(#tri-accent)" filter="url(#tri-shadow)">Tri</text>
</svg>