  </defs>
  <rect x="0" y="0" width="200" height="200" rx="20" fill="url(#ff-bg)"/>
  <rect x="3" y="3" width="194" height="194" rx="18" fill="none" stroke="#FFD700" stroke-opacity="0.15" stroke-width="1.5"/>
