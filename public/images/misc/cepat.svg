<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="cep-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0A00"/>
      <stop offset="50%" stop-color="#FF6600"/>
      <stop offset="100%" stop-color="#1A0A00"/>
    </linearGradient>
    <linearGradient id="cep-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <filter id="cep-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="200" height="200" rx="20" fill="url(#cep-bg)"/>
  <rect x="3" y="3" width="194" height="194" rx="18" fill="none" stroke="#FF6600" stroke-opacity="0.3" stroke-width="1.5"/>
  <polygon points="105,40 65,108 95,108 85,160 135,92 105,92" fill="url(#cep-accent)" filter="url(#cep-shadow)"/>
</svg>